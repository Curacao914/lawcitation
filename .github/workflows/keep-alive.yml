name: Keep HF Space Alive

on:
  schedule:
    # 每天北京时间 8:00 和 20:00 自动执行
    - cron: "0 0,12 * * *"
  workflow_dispatch: # 允许手动点击运行

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予机器人修改代码以续命的权限
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 踹一脚 HF 后端
        run: curl -s https://curacao914-citation.hf.space/test-api

      - name: 自动续期防挂机 (自己踹自己)
        uses: gautamkrishnar/keepalive-workflow@v2
