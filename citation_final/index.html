<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法学引注小助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        /* 全局样式保持不变 */

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f5f3f7;
            background-image: 
                radial-gradient(#701e5e10 1px, transparent 1px),

            background-position: 0 0, 25px 25px;
            min-height: 100vh;
            padding: 15px 0 70px;
            overflow-y: auto;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 0 20px;
            height: 50px;
        }

        .page-title {
            color: #3a2e5c;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .page-title i {
            margin-right: 10px;
            color: #701e5e;
        }

        .settings-btn {
            background-color: #701e5e;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(112, 30, 94, 0.2);
            transition: all 0.3s ease;
            padding: 0;
            margin: 0;
            z-index: 1001;
            position: relative;

        .settings-btn i {
            transform-origin: center;
            transition: transform 0.3s ease;

        .settings-btn:hover {
            background-color: #5a184a;
            box-shadow: 0 4px 12px rgba(112, 30, 94, 0.3);
        }

        .settings-btn:hover i {
            transform: rotate(90deg);
        }

        .settings-btn:active {
            transform: scale(0.9);
        }

        .api-config-container {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1002;
            width: 400px;
            max-width: calc(100% - 30px);
            transform: translateX(calc(100% + 15px));
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);

        .api-config-container.active {
            transform: translateX(0);

        .api-config-card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);

            position: relative;
            border-top: 4px solid #701e5e;

        .close-api-config {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #999;
            font-size: 18px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0;
            padding: 0;
            box-shadow: none;

        .card {
            background-color: #ffffff;

            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.07);
            padding: 20px;

        .card h3 {
            color: #3a2e5c;
            margin-bottom: 15px;
            font-size: 17px;
            display: flex;
            align-items: center;

        .card h3 i {
            margin-right: 8px;
            color: #701e5e;
        }

        textarea {
            width: 100%;
            max-height: 120px;
            min-height: 100px;
            padding: 12px;
            font-size: 14px;
            border-radius: 12px;
            border: 2px solid #e0d8e8;
            margin: 0 auto 15px;
            display: block;
            resize: vertical;
            background-color: #fdfdfe;
            transition: all 0.3s ease;

        button {
            background-color: #701e5e;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin: 5px;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 3px 6px rgba(112, 30, 94, 0.2);
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: all 0.3s ease;
        }

        button i {
            margin-right: 6px;
        }

        .copy-button {
            background-color: #45a049;
        }

        .button-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 10px 0 0;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 20px;
            padding: 12px;
            background-color: #f9f7fb;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #f0eaf5;
            max-height: 80px;
            overflow-y: auto;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #3a2e5c;
            font-size: 14px;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            border: 2px solid #701e5e;
            border-radius: 4px;
            margin-right: 6px;
            cursor: pointer;
            outline: none;
            position: relative;
        }

        input[type="checkbox"]:checked {
            background-color: #701e5e;
            border-color: #701e5e;
        }

        input[type="checkbox"]:checked::before {
            content: '\2713';
            font-size: 12px;
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .api-input-group {
            display: flex;
            gap: 10px;
            margin: 12px 0;
            align-items: center;
        }

        .api-input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 8px;
            border: 2px solid #e0d8e8;
            font-size: 14px;
            min-width: 0;

        .api-hint {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
            line-height: 1.4;
            padding: 6px 8px;

            border-radius: 6px;

        .api-status {

        .status-success {

        @keyframes ripple {
            from { transform: translate(-50%, -50%) scale(0); opacity: 1; }

        /* AI 转换按钮下方提示语样式 */
        .ai-usage-hint {

            font-size: 12px;
            color: #887a9c;
            margin-top: 15px;
            padding: 8px 15px;
            background: linear-gradient(90deg, transparent, rgba(112, 30, 94, 0.04), transparent);
            border-radius: 6px;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;

        .ai-usage-hint:hover {

        }
        @media (max-width: 768px) {
            .page-title {

            }

<body>
    <div class="container">
        <div class="header">
            <h1 class="page-title">
                <i class="fa fa-book" aria-hidden="true"></i> 法学论文引用格式转换器
            </h1>
        </div>

        <div class="card">
            <h3>
                <i class="fa fa-pencil" aria-hidden="true"></i> 原始引用输入
            </h3>
            <textarea 
                id="inputCitations" 
                rows="4" 
                placeholder="请在此输入原始引用（每个文献一行）"
            ></textarea>

            <!-- 仅保留需要的复选框选项 -->
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="selectAll" checked> 全选
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="removeNumbers"> 去掉数字序号
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="removeSpaces"> 去除空格
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="convertSymbols"> 全角符号转半角
                </label>
            </div>

            <div class="button-container">
                <button onclick="convertAndDisplay()">
                    <i class="fa fa-refresh" aria-hidden="true"></i> 清洗转换
                </button>
                <button id="assistantButton">
                    <i class="fa fa-comments" aria-hidden="true"></i> AI转换
                </button>
                <button class="copy-button" onclick="copyToClipboard()">
                    <i class="fa fa-copy" aria-hidden="true"></i> 一键复制
                </button>
            </div>
        </div>
        <div class="ai-usage-hint">
                <i class="fa fa-leaf" aria-hidden="true" style="color: #a098aa;"></i> 
                对于期刊、专著等常见文献请先使用“清洗转换”，无法识别再使用AI转换（孩子穷，API额度省着点花 QAQ）
            </div>

        <div class="card">
            <h3>
                <i class="fa fa-file-text" aria-hidden="true"></i> 转换后结果
            </h3>
            <textarea 
                id="outputTextarea" 
                rows="4" 
                readonly 
                placeholder="转换后的引用内容"
                style="resize: none; border: 2px solid #e0d8e8; background-color: #fdfdfe;"
            ></textarea>

            <div class="button-container">
                <button onclick="openReferenceTool()">
                    <i class="fa fa-sort-numeric-asc" aria-hidden="true"></i> 一键编号/排序工具
                </button>
                <button onclick="openEndNoteTool()">
                    <i class="fa fa-exchange" aria-hidden="true"></i> EndNote转法学引注
                </button>
            </div>
        </div>

        <div class="copyright-info">
            作者：北大法学院Curacao | 
            改编自南大法学院Chollima <a href="https://pegaseius.github.io/faxuezhuan/" target="_blank">格式转换器</a> | 
            <a href="https://xiaohongshu.com/user/profile/3895712578" target="_blank">小红书：中单兔法师</a>
        </div>
    </div>

    <script>

        // 工具跳转
        function openEndNoteTool() {
            window.open('https://pegaseius.github.io/endnote/', '_blank');
        }

        function openReferenceTool() {
            window.open('https://pegaseius.github.io/lawschoolreferencetest/', '_blank');
        }

        // 复选框全选逻辑（仅针对保留的选项）
        function toggleAllCheckboxes() {
            const selectAllCheckbox = document.getElementById("selectAll");
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:not(#selectAll)');
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAllCheckbox.checked;
            });
        }

        document.addEventListener("DOMContentLoaded", function () {
            const selectAllCheckbox = document.getElementById('selectAll');
            const otherCheckboxes = document.querySelectorAll('input[type="checkbox"]:not(#selectAll)');

            selectAllCheckbox.addEventListener('change', toggleAllCheckboxes);
            otherCheckboxes.forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    selectAllCheckbox.checked = Array.from(otherCheckboxes).every(cb => cb.checked);
                });
            });
            selectAllCheckbox.dispatchEvent(new Event('change'));
        });

function convertAndDisplay() {
    let cleanedText = transformText(); // 调用你现在的清洗逻辑
    // 发射信号， main.js 才能接收到
    const event = new CustomEvent('cleanedTextAvailable', { detail: { cleanedText: cleanedText } });
    document.dispatchEvent(event);
}

        // 基础清洗逻辑（仅保留需要的功能）
        function transformText() {
            const inputCitations = document.getElementById("inputCitations").value;
            // 仅保留需要的选项（删除了全角数字转半角、移除多余标点等逻辑）
            const removeNumbers = document.getElementById("removeNumbers").checked;
            const removeSpaces = document.getElementById("removeSpaces").checked;
            const convertSymbols = document.getElementById("convertSymbols").checked;

            // 在不改变当前 UI 的前提下，恢复旧版的 4 个清洗能力（默认开启）
            const convertNumbers = true;
            const removeExtraPunctuation = true;
            const splitJumpCitationsEnabled = true;
            const removeDOIEnabled = true;

            let lines = inputCitations.split("\n");
            let output = [];

            for (let line of lines) {
                if (!line.trim()) continue;

                // 1. 去除数字序号（行首的[1]、1.、(1)等）
                if (removeNumbers) {
                    line = line.replace(/^\s*(\[\d+\]|\d+\.|\(\d+\)|\d+\))\s*/, "").trim();
                }

                // 2. 去除空格（半角+全角）
                if (removeSpaces) {
                    line = line.replace(/[\s　]+/g, "");
                }

                // 3. 全角符号转半角（基础符号）
                if (convertSymbols) {
                    const symbolMap = {
                        '：': ':', '。': '.', '，': ',', '；': ';',
                        '（': '(', '）': ')', '［': '[', '］': ']', '．': '.'
                    };
                    let converted = '';
                    for (let char of line) {
                        converted += symbolMap[char] || char;
                    }
                    line = converted;
                }

                // 4. 全角数字转半角
                if (convertNumbers) {
                    line = convertFullwidthNumbersToHalfwidth(line);
                }

                // 5. 移除冗余标点
                if (removeExtraPunctuation) {
                    line = removeRedundantPunctuation(line);
                }

                // 6. 拆分跳跃引注
                if (splitJumpCitationsEnabled) {
                    line = splitJumpCitations(line);
                }

                // 7. 去除 DOI
                if (removeDOIEnabled) {
                    line = removeDOI(line);
                }

                output.push(line);
            }

            return output.join("\n");
        }

        function convertFullwidthNumbersToHalfwidth(line) {
            return line.replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0));
        }

        function removeRedundantPunctuation(line) {
            line = line.replace(/(?<=\d),(?=\()/g, "");
            line = line.replace(/;{2,}/g, ";");
            line = line.replace(/,{2,}/g, ",");
            line = line.replace(/\.{2,}/g, ".");
            return line;
        }

        function splitJumpCitations(line) {
            const jumpCitationPattern = /\+(\d+(?:-\d+)?)/g;
            let match;
            let baseText = line.replace(jumpCitationPattern, '');
            let additionalLines = "";

            jumpCitationPattern.lastIndex = 0;
            while ((match = jumpCitationPattern.exec(line)) !== null) {
                let preText = line.substring(0, line.lastIndexOf(":", match.index) + 1);
                additionalLines += preText + match[1] + ".\n";
            }

            return baseText + (additionalLines ? "\n" + additionalLines : "");
        }

        function removeDOI(line) {
            return line.replace(/DOI:.*/, "");
        }

        // 复制功能
        function copyToClipboard() {
            const outputTextarea = document.getElementById('outputTextarea');
            const text = outputTextarea.value.trim();

            if (!text) {
                alert('转换结果为空，无法复制！');
                return;
            }

            outputTextarea.select();
            document.execCommand('copy');

            const copyBtn = document.querySelector('.copy-button');
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fa fa-check" aria-hidden="true"></i> 复制成功！';
            copyBtn.style.backgroundColor = '#2e7d32';

            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                copyBtn.style.backgroundColor = '#45a049';
            }, 2000);
        }

        // 文本框交互
        document.addEventListener("DOMContentLoaded", function () {
            const inputCitations = document.getElementById('inputCitations');
            const outputTextarea = document.getElementById('outputTextarea');

            inputCitations.addEventListener('input', function () {
                this.placeholder = this.value.trim()? '' : '请在此输入原始引用（每个文献一行）';
            });

            outputTextarea.addEventListener('input', function () {
                this.placeholder = this.value.trim()? '' : '转换后的引用内容';
            });
        });

        // 按钮涟漪效果
        document.addEventListener("DOMContentLoaded", function () {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(button => {
                button.addEventListener('mousedown', function (e) {
                    const x = e.pageX - this.getBoundingClientRect().left;
                    const y = e.pageY - this.getBoundingClientRect().top;

                    const ripple = document.createElement('span');
                    ripple.style.position = 'absolute';
                    ripple.style.width = '100%';
                    ripple.style.height = '100%';
                    ripple.style.top = `${y}px`;
                    ripple.style.left = `${x}px`;
                    ripple.style.borderRadius = '50%';
                    ripple.style.backgroundColor = 'rgba(255, 255, 255, 0.2)';
                    ripple.style.animation = 'ripple 0.4s linear forwards';
                    ripple.style.zIndex = '-1';

                    this.appendChild(ripple);
                    ripple.addEventListener('animationend', () => ripple.remove());
                });
            });
        });

        // AI调用功能
document.getElementById('assistantButton').addEventListener('click', function () {
    const inputText = document.getElementById('inputCitations').value.trim();

    if (!inputText) {
        alert('请先输入需要处理的引用文本！');
        return;
    }

    const button = this;
    const originalText = button.innerHTML;
    button.innerHTML = '<i class="fa fa-spinner fa-spin" aria-hidden="true"></i> 处理中...';
    button.disabled = true;
    document.getElementById('outputTextarea').value = 'AI正在处理，请稍候...';

    // 注意：这里的 URL 请换成你实际的 HF Space 地址
    fetch('https://curacao914-citation.hf.space/api/call-ai', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
            // 已经删除了 'X-API-Key'，因为后端自己有环境变量了
        },
        body: JSON.stringify({ prompt: inputText }),
    })
   .then(response => {
        if (!response.ok) throw new Error('API调用失败');
        return response.json();
    })
   .then(data => {
        document.getElementById('outputTextarea').value = data.response || '未获取到结果';
    })
   .catch(error => {
        document.getElementById('outputTextarea').value = `处理失败：${error.message}`;
    })
   .finally(() => {
        button.innerHTML = originalText;
        button.disabled = false;
    });
});
    </script>
    <script>
        // 【第一部分：监听信号】
// 这里的逻辑是：一旦监听到 index.html 发出的 'cleanedTextAvailable' 信号，就执行转换
document.addEventListener('cleanedTextAvailable', function (e) {
    // 从信号的“口袋”（detail）里取出清洗后的文本
    const cleanedText = e.detail.cleanedText;
    console.log("【调试】main.js 已接收到信号，开始转换...");
    
    // 调用下方的处理函数
    convertAndDisplayWithCleanedText(cleanedText);
});

// 【第二部分：核心转换逻辑】
function convertAndDisplayWithCleanedText(data) {
    if (!data) {
        console.log("没有接收到清洗后的数据");
        return;
    }
    
    // 将传入的数据分行处理
    const inputCitationArray = data.split('\n');
    let outputCitations = '';

    // 遍历转换
    inputCitationArray.forEach(inputCitation => {
        // 调用你下方的正则库 convertCitation 进行匹配
        const outputCitation = convertCitation(inputCitation.trim().replace(/;/g, '、'));
        
        // 修正标点符号：将中文字符间的英文逗号转为顿号
        outputCitations += outputCitation.replace(/([^\x00-\xff]),([^\x00-\xff])/g, '$1、$2') + '\n';
    });

    const outputTextarea = document.getElementById('outputTextarea');
    if (outputTextarea) {
        outputTextarea.value = outputCitations.trim();
        console.log("【调试】转换结果已写入页面");
    }
}

// 【第三部分：工具函数】跳转及复制功能
function openReferenceTool() {
    window.open('https://pegaseius.github.io/lawschoolreferencetest/', '_blank'); 
}

function copyToClipboard() {
    const outputTextarea = document.getElementById('outputTextarea');
    const text = outputTextarea ? outputTextarea.value.trim() : "";

    if (!text) {
        alert('转换结果为空，无法复制！');
        return;
    }

    const tempTextArea = document.createElement('textarea');
    tempTextArea.value = text;
    document.body.appendChild(tempTextArea);
    tempTextArea.select();
    document.execCommand('copy');
    document.body.removeChild(tempTextArea);

    // 找到按钮并反馈
    const copyBtn = document.querySelector('.copy-button');
    if (copyBtn) {
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fa fa-check"></i> 复制完成';
        setTimeout(() => { copyBtn.innerHTML = originalText; }, 1500);
    }
}

// 【第四部分：正则规则库】这是你最核心的财产，不要动它
function convertCitation(inputCitation) {
    const regexWithPages = /^(.+?)\.(.+?)\[(.+?)\]\.(.+?),(\d{4})\((\d{1,2})\):(\d+)-(\d+)\.$/;
    const regexWith1Page = /^(.+?)\.(.+?)\[(.+?)\]\.(.+?),(\d{4})\((\d{1,2})\):(\d+)\.$/;
    const regexWithoutPages = /^(.+?)\.(.+?)\[(.+?)\]\.(.+?),(\d{4})\((\d{1,2})\)\.$/;
    const regexWithPagesandv = /^(.+?)\.(.+?)\[(.+?)\]\.(.+?),(\d{4}),(\d{1,2})\((\d{1,2})\):(\d+)-(\d+)\.$/;
    const regexWith1Pageandv = /^(.+?)\.(.+?)\[(.+?)\]\.(.+?),(\d{4}),(\d{1,2})\((\d{1,2})\):(\d+)\.$/;
    const regexWithoutPagesandv = /^(.+?)\.(.+?)\[(.+?)\]\.(.+?),(\d{4}),(\d{1,2})\((\d{1,2})\)\.$/;
    const regexzhiwangqikan = /^(.*?)\[(.*?)\]\.(.*?)\.(.*?)\,(.*?)\((.*?)\)/;
    const regexPublisher = /^(.+?)\.(.+?)\[M\]\.([^:,]+):([^,]+),(\d{4})\.$/;
    const regexPublisherwithpages = /^(.+?)\.(.+?)\[M\]\.(.+?):(.+?),(\d+):(\d+)-(\d+)\.$/;
    const regexPublisherwith1page = /^(.+?)\.(.+?)\[(M)\]\.(.+?):(.+?),(\d+):(\d+)\.$/;
    const regexzhiwangbookz = /^(.*?)\[(.*?)\]\.(.*?)(著)\.(.*?)\.(.*)/;
    const regexzhiwangbookzb = /^(.*?)\[(.*?)\]\.(.*?)(主编)\.(.*?)\.(.*)/;
    const regexzhiwangbook = /^(.*?)\[(.*?)\]\.(.*?)\.(.*?)\.(.*)/;
    const regexDegree = /^(.+?)\.(.+?)\[(D)\]\.(.+?):(.+?),(\d+)\.$/;
    const regexDegreewithpages = /^(.+?)\.(.+?)\[(D)\]\.(.+?):(.+?),(\d+):(\d+)-(\d+)\.$/;
    const regexDegreewith1page = /^(.+?)\.(.+?)\[(D)\]\.(.+?):(.+?),(\d+):(\d+)\.$/;
    const regexzhiwangdegree = /^(.+?)\[(\w)\]\.\s*(.+?)\.(.+?),(\d+)$/;

    let match;
    match = inputCitation.match(regexWithPages);
    if (match) {
        const period = parseInt(match[6], 10);
        return `${match[1]}：《${match[2]}》，载《${match[4]}》${match[5]}年第${period}期，第${match[7]}~${match[8]}页。`;
    }
    match = inputCitation.match(regexWith1Page);
    if (match) {
        const period = parseInt(match[6], 10);
        return `${match[1]}：《${match[2]}》，载《${match[4]}》${match[5]}年第${period}期，第${match[7]}页。`;
    }
    match = inputCitation.match(regexWithoutPages);
    if (match) {
        const period = parseInt(match[6], 10);
        return `${match[1]}：《${match[2]}》，载《${match[4]}》${match[5]}年第${period}期。`;
    }
    match = inputCitation.match(regexWithPagesandv);
    if (match) {
        const volume = parseInt(match[6], 10);
        const period = parseInt(match[7], 10);
        return `${match[1]}：《${match[2]}》，载《${match[4]}》${match[5]}年第${volume}卷第${period}期，第${match[8]}~${match[9]}页。`;
    }
    match = inputCitation.match(regexWith1Pageandv);
    if (match) {
        const volume = parseInt(match[6], 10);
        const period = parseInt(match[7], 10);
        return `${match[1]}：《${match[2]}》，载《${match[4]}》${match[5]}年第${volume}卷第${period}期，第${match[8]}页。`;
    }
    match = inputCitation.match(regexWithoutPagesandv);
    if (match) {
        const volume = parseInt(match[6], 10);
        const period = parseInt(match[7], 10);
        return `${match[1]}：《${match[2]}》，载《${match[4]}》${match[5]}年第${volume}卷第${period}期。`;
    }
    match = inputCitation.match(regexzhiwangqikan);
    if (match) {
        const period = parseInt(match[6], 10);
        return `${match[3]}：《${match[1]}》，载《${match[4]}》${match[5]}年第${period}期。`;
    }
    match = inputCitation.match(regexPublisher);
    if (match) return `${match[1]}：《${match[2]}》，${match[4]}${match[5]}年版。`;
    match = inputCitation.match(regexPublisherwithpages);
    if (match) return `${match[1]}：《${match[2]}》，${match[4]}${match[5]}年版，第${match[6]}~${match[7]}页。`;
    match = inputCitation.match(regexPublisherwith1page);
    if (match) return `${match[1]}：《${match[2]}》，${match[5]}${match[6]}年版，第${match[7]}页。`;
    match = inputCitation.match(regexzhiwangbookz);
    if (match) return `${match[3]}：《${match[1]}》，${match[5]}${match[6]}年版。`;
    match = inputCitation.match(regexzhiwangbookzb);
    if (match) return `${match[3]}：《${match[1]}》，${match[5]}${match[6]}年版。`;
    match = inputCitation.match(regexzhiwangbook);
    if (match) return `${match[3]}：《${match[1]}》，${match[4]}${match[5]}年版。`;
    match = inputCitation.match(regexDegree);
    if (match) return `${match[1]}：《${match[2]}》，${match[5]}${match[6]}年博士论文。`;
    match = inputCitation.match(regexDegreewithpages);
    if (match) return `${match[1]}：《${match[2]}》，${match[5]}${match[6]}年博士论文,第${match[7]}~${match[8]}页。`;
    match = inputCitation.match(regexDegreewith1page);
    if (match) return `${match[1]}：《${match[2]}》，${match[5]}${match[6]}年博士论文,第${match[7]}页。`;
    match = inputCitation.match(regexzhiwangdegree);
    if (match) return `${match[3]}：《${match[1]}》，${match[4]}${match[5]}年博士论文。`;

    return "无法识别的引用格式";
}
